<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>教材棚卸</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="top-panel">
      <div class="top-panel-inner">
        <div class="head-main">
          <div class="title-wrap">
            <h1 class="title">
              <span>教材棚卸</span><span id="roomLabel" class="title-room"></span>
            </h1>
          </div>

          <div class="head-actions">
            <button
              id="toolMenuBtnAddCustom"
              class="btn-subtle btn-subtle-add"
              type="button"
            >
              ＋ 未登録教材を追加
            </button>
            <button
              id="toolMenuBtn"
              class="btn-subtle btn-subtle-other"
              type="button"
            >
              …
            </button>
          </div>
        </div>

        <div class="toolbar-card">
          <div class="access-bar" id="accessBar">
            <div id="infoMessage" class="info-message"></div>
            <div id="errorMessage" class="error-message" hidden></div>
          </div>

          <div class="search-wrap">
            <div class="search-main-row">
              <div class="search-field">
                <input
                  id="searchInput"
                  class="search-input"
                  type="search"
                  placeholder="教材名・出版社で検索..."
                  autocomplete="off"
                />
                <button
                  id="searchClearBtn"
                  class="search-clear-btn"
                  type="button"
                  aria-label="検索文字列をクリア"
                  hidden
                >
                  ×
                </button>
              </div>
              <button
                id="inputOnlyToggle"
                class="input-only-toggle"
                type="button"
                aria-pressed="false"
              >
                入力済みのみ
              </button>
            </div>
            <div class="filter-layout">
              <div
                id="filterArea"
                class="filter-scroll"
                role="group"
                aria-label="教材フィルタ"
              ></div>
            </div>
          </div>

          <div id="metaPanel" class="meta-panel always-open"></div>
        </div>
      </div>
    </header>

    <main class="shell">
      <section class="list-wrap">
        <div id="list"></div>
      </section>
    </main>

    <div id="copyPopover" class="copy-popover" hidden aria-hidden="true">
      <button
        id="editCustomItemBtn"
        class="copy-popover-btn"
        type="button"
        hidden
      >
        編集
      </button>
      <button id="copyFromItemBtn" class="copy-popover-btn" type="button">
        引用して未登録教材を追加
      </button>
    </div>

    <div class="bottom-bar">
      <div class="bottom-inner compact">
        <div class="save-status">
          <span class="save-status-dot" aria-hidden="true"></span>
          <span id="dirtyCount" class="summary-label">保存済み</span>
        </div>

        <div id="completionNotice" class="completion-notice" hidden>
          <div class="completion-notice-inner">
            <div class="completion-notice-title">本部への送信が完了しています。</div>
            <div id="completionNoticeMeta" class="completion-notice-meta"></div>
          </div>
        </div>

        <div class="bottom-actions">
          <button id="sendBtn" class="btn-main" disabled type="button">
            保存
          </button>
          <button
            id="completeInventoryBtn"
            class="btn-complete"
            type="button"
          >
            棚卸完了
          </button>
        </div>
      </div>
    </div>

    <input
      id="importFileInput"
      type="file"
      accept=".json,application/json"
      hidden
    />

    <dialog id="toolMenuDialog" class="menu-dialog">
      <div class="modal-head">
        <h2 class="modal-title">メニュー</h2>
        <button
          id="closeToolMenuBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
      </div>
      <div class="menu-list">
        <div id="completeInventoryStatus" class="menu-status" hidden>
          本部への送信が完了しています
        </div>
        <button id="viewInputtedListBtn" class="menu-item" type="button">
          入力内容を確認
        </button>
        <button id="viewLocalLogsBtn" class="menu-item" type="button">
          ログを見る
        </button>
        <button id="exportCsvBtn" class="menu-item" type="button">
          CSV出力
        </button>
        <section
          id="backupMenuGroup"
          class="menu-group"
          aria-labelledby="backupGroupTitle"
        >
          <div class="menu-group-head">
            <h3 id="backupGroupTitle" class="menu-group-title">バックアップ</h3>
            <div class="menu-group-hint">
              <button
                id="backupInfoBtn"
                class="hint-trigger menu-hint-trigger"
                type="button"
                aria-label="バックアップの説明"
                aria-describedby="backupInfoTooltip"
              >
                <img
                  class="hint-icon"
                  src="images/info.svg"
                  alt=""
                  aria-hidden="true"
                />
              </button>
              <span
                id="backupInfoTooltip"
                class="hint-tooltip menu-hint-tooltip"
                role="tooltip"
              >
                通信が不安定で入力内容をサーバーに保存できない場合は、入力内容を端末に保存しておくと、後から取り込みできます。
              </span>
            </div>
          </div>
          <div class="menu-row">
            <button id="exportJsonBtn" class="menu-item" type="button">
              保存
            </button>
            <button id="importJsonBtn" class="menu-item" type="button">
              取込
            </button>
          </div>
        </section>
        <p class="menu-note">
          ※お困りの際はプラドアカデミー教務本部までお問い合わせください。
        </p>
      </div>
    </dialog>

    <dialog id="inputtedItemsDialog" class="menu-dialog review-dialog">
      <div class="modal-head">
        <h2 class="modal-title">入力済み教材一覧</h2>
        <button
          id="closeInputtedItemsBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
      </div>
      <div class="modal-body">
        <div id="inputtedItemsSummary" class="info-message"></div>
        <div id="inputtedItemsList" class="review-list"></div>
      </div>
    </dialog>

    <dialog id="localLogsDialog" class="menu-dialog review-dialog">
      <div class="modal-head">
        <h2 class="modal-title">ローカルログ</h2>
        <button
          id="closeLocalLogsBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-inline-actions">
          <button id="clearLocalLogsBtn" class="btn-ghost" type="button">
            ログを消去
          </button>
        </div>
        <div id="localLogsList" class="review-list"></div>
      </div>
    </dialog>

    <dialog id="customItemDialog">
      <div class="modal-head">
        <h2 class="modal-title">未登録教材を追加</h2>
        <button
          id="closeCustomDialogBtn"
          class="dialog-close-btn"
          type="button"
          aria-label="閉じる"
        >
          ×
        </button>
      </div>

      <form id="customItemForm" method="dialog">
        <div class="modal-body">
          <div class="form-grid">
            <div class="form-row">
              <label for="customName"
                >教材名 <span style="color: #dc2626">*</span></label
              >
              <input
                id="customName"
                class="input"
                type="text"
                placeholder="例：サンプル問題集 社会 中3 / よくわかる高校数学"
                required
              />
            </div>

            <div class="form-row">
              <label for="customEdition">版・準拠</label>
              <input
                id="customEdition"
                class="input"
                type="text"
                placeholder="例：改訂版 / 20XX年度版 / 東書 など"
              />
            </div>

            <div class="form-row">
              <label for="customPublisher">出版社</label>
              <input
                id="customPublisher"
                class="input"
                type="text"
                placeholder="例：○○出版 （基本的には記入不要です）"
              />
            </div>

            <div class="form-row">
              <label>数量</label>
              <div class="qty-box custom-qty-box">
                <button
                  id="customQtyMinus"
                  type="button"
                  class="qty-btn minus"
                  aria-label="減らす"
                >
                  −
                </button>
                <input
                  id="customQtyInput"
                  class="qty-input num"
                  type="number"
                  inputmode="numeric"
                  pattern="[0-9]*"
                  min="0"
                  step="1"
                  value="0"
                  aria-label="数量"
                />
                <button
                  id="customQtyPlus"
                  type="button"
                  class="qty-btn plus"
                  aria-label="増やす"
                >
                  ＋
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="modal-foot">
          <button
            id="deleteCustomBtn"
            class="btn-ghost danger"
            type="button"
            hidden
          >
            削除する
          </button>
          <button id="cancelCustomBtn" class="btn-ghost" type="button">
            キャンセル
          </button>
          <button id="saveCustomBtn" class="btn-success" type="submit">
            追加する
          </button>
        </div>
      </form>
    </dialog>

    <script src="data.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
