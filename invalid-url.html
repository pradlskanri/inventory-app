<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <title>無効なURL</title>
    <style>
      :root {
        --bg: #f5f7fb;
        --surface: #ffffff;
        --text: #1f2937;
        --sub: #667085;
        --line: #e5e7eb;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f7f9fc 0%, #f2f5f9 100%);
        color: var(--text);
        font-family:
          -apple-system, BlinkMacSystemFont, "Hiragino Sans",
          "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      }

      .card {
        width: min(100%, 520px);
        padding: 32px 28px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: var(--surface);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.4;
      }

      p {
        margin: 0;
        color: var(--sub);
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>無効なURLです</h1>
      <p>このページは開けません。正しいURLから再度アクセスしてください。</p>
    </main>
  </body>
</html>
