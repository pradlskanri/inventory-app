<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        margin: 0;
        background: #f7fafc;
        color: #1f2937;
        font-family: "Yu Gothic UI", sans-serif;
      }

      .page {
        padding: 20px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 16px;
      }

      .btn {
        border: none;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
      }

      .btn-primary {
        background: #1565c0;
        color: #fff;
      }

      .btn-subtle {
        background: #e2e8f0;
        color: #1f2937;
      }

      .btn:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .status {
        font-size: 13px;
        color: #475569;
      }

      .panel {
        overflow: hidden;
        border: 1px solid #cbd5e1;
        border-radius: 12px;
        background: #fff;
      }

      .table-wrap {
        max-height: 470px;
        overflow: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        border-bottom: 1px solid #e2e8f0;
        padding: 10px 12px;
        text-align: left;
        font-size: 13px;
      }

      th {
        position: sticky;
        top: 0;
        background: #eff6ff;
        font-weight: 700;
      }

      th.center,
      td.center {
        text-align: center;
      }

      .muted {
        color: #64748b;
      }

      .pill {
        display: inline-block;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 700;
      }

      .pill-done {
        background: #dcfce7;
        color: #166534;
      }

      .pill-open {
        background: #fee2e2;
        color: #991b1b;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="toolbar">
        <button id="reloadBtn" class="btn btn-subtle" type="button">再読み込み</button>
        <button id="saveBtn" class="btn btn-primary" type="button">更新</button>
        <span id="status" class="status">読み込み中...</span>
      </div>

      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>校舎名</th>
                <th>完了状況</th>
                <th>完了日時</th>
                <th class="center">更新</th>
              </tr>
            </thead>
            <tbody id="rows"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const state = {
        entries: [],
        isLoading: false,
        isSaving: false,
      };

      const rowsEl = document.getElementById("rows");
      const statusEl = document.getElementById("status");
      const reloadBtn = document.getElementById("reloadBtn");
      const saveBtn = document.getElementById("saveBtn");

      reloadBtn.addEventListener("click", loadEntries);
      saveBtn.addEventListener("click", saveEntries);

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function syncButtons() {
        reloadBtn.disabled = state.isLoading || state.isSaving;
        saveBtn.disabled =
          state.isLoading ||
          state.isSaving ||
          state.entries.length === 0;
      }

      function render() {
        if (state.entries.length === 0) {
          rowsEl.innerHTML =
            '<tr><td colspan="4" class="muted">表示できるデータがありません。</td></tr>';
          syncButtons();
          return;
        }

        rowsEl.innerHTML = state.entries
          .map((entry, index) => {
            const statusClass = entry.completed
              ? "pill pill-done"
              : "pill pill-open";
            const statusText = entry.completed ? "完了" : "未完了";
            const roomName = escapeHtml(
              entry.roomLabel || entry.outputSheetName || "(未設定)",
            );
            const completedAt = escapeHtml(entry.completedAt || "");

            return `
              <tr>
                <td>${roomName}</td>
                <td><span class="${statusClass}">${statusText}</span></td>
                <td>${completedAt}</td>
                <td class="center">
                  <input
                    type="checkbox"
                    data-index="${index}"
                    ${entry.completed ? "checked" : ""}
                  >
                </td>
              </tr>
            `;
          })
          .join("");

        Array.from(rowsEl.querySelectorAll('input[type="checkbox"]')).forEach(
          (input) => {
            input.addEventListener("change", (event) => {
              const index = Number(event.target.getAttribute("data-index"));
              state.entries[index].completed = event.target.checked;
            });
          },
        );

        syncButtons();
      }

      function loadEntries() {
        state.isLoading = true;
        setStatus("棚卸完了状況を読み込み中...");
        syncButtons();

        google.script.run
          .withSuccessHandler((entries) => {
            state.entries = Array.isArray(entries) ? entries : [];
            state.isLoading = false;
            setStatus(`棚卸完了状況を表示中: ${state.entries.length}校舎`);
            render();
          })
          .withFailureHandler((error) => {
            state.isLoading = false;
            setStatus(`読み込みに失敗しました: ${error.message || error}`);
            render();
          })
          .getInventoryCompletionStatusesForModal();
      }

      function saveEntries() {
        state.isSaving = true;
        setStatus("棚卸完了状況を更新中...");
        syncButtons();

        const payload = state.entries.map((entry) => ({
          token: entry.token,
          completed: !!entry.completed,
        }));

        google.script.run
          .withSuccessHandler((result) => {
            state.entries = Array.isArray(result.entries) ? result.entries : [];
            state.isSaving = false;
            setStatus(`更新完了: ${result.updatedCount || 0}件`);
            render();
          })
          .withFailureHandler((error) => {
            state.isSaving = false;
            setStatus(`更新に失敗しました: ${error.message || error}`);
            syncButtons();
          })
          .updateInventoryCompletionStatusesFromModal(payload);
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      loadEntries();
    </script>
  </body>
</html>
